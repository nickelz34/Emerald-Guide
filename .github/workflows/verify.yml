name: Verify

on:
  pull_request:
  push:
    branches: [main]

jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Verify changelog + version sync
        run: node scripts/verify-changelog.mjs
